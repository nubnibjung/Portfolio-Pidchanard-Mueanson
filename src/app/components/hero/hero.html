<section class="hero-section" aria-labelledby="hero-title">
  <div class="hero-content">
    <div class="hero-main">
      <div class="hero-copy">
        <h1 id="hero-title">Hi, I'm {{ profile().name }} <span class="wave" aria-hidden="true">👋</span></h1>
        <p class="hero-tagline">{{ profile().tagline }}</p>
        <a class="resume-btn" href="/cv_พิชญ์นาฏ เหมือนสนธิ์.pdf" download>
          <svg viewBox="0 0 24 24" aria-hidden="true" width="16" height="16" fill="currentColor">
            <path d="M12 16l-5-5 1.4-1.4 2.6 2.6V4h2v8.2l2.6-2.6L17 11l-5 5zm-7 2h14v2H5v-2z"/>
          </svg>
          Download Resume
        </a>
      </div>

      <img
        class="avatar"
        src="/assets/images/profile/profile-picture.jpg?v=2"
        [alt]="profile().name + ' profile picture'"
      />
    </div>
  </div>
</section>
