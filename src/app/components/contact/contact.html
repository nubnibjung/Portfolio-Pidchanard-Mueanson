<section class="page-section contact-section" id="contact">
  <span class="section-pill">Contact</span>
  <h2>Get in Touch</h2>
  <p>
    Want to chat? Just shoot me a dm
    <a [href]="'mailto:' + profile().email">with a direct question on email</a>
    and I'll respond whenever I can.
  </p>
  <a [href]="'mailto:' + profile().email" class="contact-email">{{ profile().email }}</a>
</section>
